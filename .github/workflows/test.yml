name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx
          # Core runtime deps (hermes-agent excluded — not needed for unit tests)
          pip install fastapi "uvicorn[standard]" pydantic pyyaml packaging python-multipart
          # Document extraction deps
          pip install pymupdf openpyxl python-docx python-pptx xlrd beautifulsoup4
          # Install trade package in dev mode
          pip install -e . --no-deps

      - name: Run tests
        run: python -m pytest tests/ -v
